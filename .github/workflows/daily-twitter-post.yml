name: Daily Twitter Post

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Publish scheduled Twitter post
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            npm run publish:scheduled:twitter
          else
            npm run publish:twitter
          fi
        env:
          PROMPTS34_API_URL: https://api.prompts34.com
          PROMPTS34_WEBSITE_URL: https://prompts34.com
          SCHEDULE_DEDUPE_WINDOW: 14
          SCHEDULE_TARGET_HOUR_TR: 12
          SCHEDULE_TARGET_MINUTE_TR: 30
          IMAGE_PROVIDER: openai
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          X_CLIENT_ID: ${{ secrets.X_CLIENT_ID }}
          X_CLIENT_SECRET: ${{ secrets.X_CLIENT_SECRET }}
